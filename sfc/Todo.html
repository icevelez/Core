<script>
    import { todo } from "./store.js";
    import { signal, effect } from "../core/runtime.js";

    console.log("Hello from Todo");

    export default class {
        todo_store = todo;
        new_todo = signal("");
    }
</script>

<div>
    <input bind:value="$.new_todo" type="text" placeholder="New Todo">
    <button on:click="() => { $.todo_store.add_todo($.new_todo()); $.new_todo = ''; }">Add Todo</button>
</div>
<div>
    {{#each $.todo_store.state as { todo, done }, i}}
        <div>
            <p>{{ $.done ? '✅ ' : '' }}{{ $.todo }}</p><input type="checkbox" on:click="() => $.todo_store.toggle_todo($.i)"/>
            <button on:click="() => $.todo_store.remove_todo($.i)">Remove</button>
        </div>
    {{/each}}
</div>
