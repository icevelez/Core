<script>
    import { signal } from "../core/runtime.js";
    import { Router } from "../lib/router.js";

    export default function() {

        const [name, setName] = signal("John");
        const [count, setCount] = signal(0);

        const action = (node, arg) => {
            console.log("ACTION:", node, arg);
        }
    }
</script>

<div use:action="Router"></div>
<h1>Hello {{ name() }}</h1>
<input type="text" on:input="(e) => setName(e.target.value)" :value="name()">
<p>count {{ count() }}</p>
<button on:click="() => setCount(count()+1)">Click Me to Increment Count</button>
