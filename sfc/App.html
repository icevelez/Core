<script>
    import { sfc } from "#/core/parser/handlebar.js";
    import { signal } from "#/core/runtime.js";

    console.log("Hello from App");

    export const Example = await sfc("/sfc/Example.html");

    export default class {

        name = signal("John");
        count = signal(0);

    }
</script>

<button on:click="() => $.count.set($.count()+1)">Click Me</button>
<input bind:value="$.name">
<h1>Hello {{ $.name() }}</h1>
<hr>
    <Example :name="`${$.name()} ${$.count()}`">
        <h1>Hi from Parent Scope {{ $.count() }}</h1>
    </Example>
<hr>
