<script>
    import { component } from "../core/parser/handlebar.js";
    import { signal, bind } from "../core/runtime.js";
    import { Router } from "../lib/router.js";

    export const PropSlotExample = component("sfc/PropSlotExample.html");
    export const Todo = component("sfc/Todo.html");

    export default function() {

        const [name, setName] = signal("John");
        const [count, setCount] = signal(0);

        const myaction = (node, arg) => {
            console.log("HEEEELLO", node, arg);
        }
    }
</script>

{{#if Router.match("/benchmark").is_match}}
    {{#await component("sfc/Benchmark.html")}}
        <h1>Loading Benchmark</h1>
    {{:then Benchmark}}
        <CoreComponent default="Benchmark"/>
    {{/await}}
{{:else if Router.match("/todo").is_match}}
    <Todo/>
{{:else}}
    <button use:myaction="'Hello'" on:click="() => setCount(count()+1)">Count: {{ count() }}</button>
    <input use:bind="['value', name, setName]">
    <h1>Hello {{ name() }}</h1>
    <hr>
    <PropSlotExample :name="`${name()} ${count()}`">
        <h1>Hi from Parent Scope {{ count() }}</h1>
    </PropSlotExample>
{{/if}}
