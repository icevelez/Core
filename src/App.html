<button on:click="() => $.show_benchmark.set(!$.show_benchmark())">Click Me</button>
{{#if $.show_benchmark() }}
    {{#await import("/src/Benchmark.js")}}
        <h1>Loading Benchmark</h1>
    {{:then Benchmark}}
        <Core:component default="Benchmark"/>
    {{/await}}
{{:else}}
    <h1>{{ $.name }}</h1>
    <p>Birth Date: {{ `${$.birth_date.toISOString()}` }}</p>
    <button on:click="() => $.counter.set($.counter()+1)">Count: {{ $.counter() }}</button>
    <hr>
    <h1>{{ $.message() }}</h1>
    <input type="text" bind:value="$.message"/>

    <Comp :name="$.name">
        <h1>This is from parent {{ $.message() }}</h1>
    </Comp>
{{/if}}
