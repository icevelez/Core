<script>
    import { todos } from "./store.js";
    import { signal, bind, on_mount } from "core";

    console.log("Hello from Todo");

    export default function(props) {
        const todo_completed = () => todos.state.filter((todo) => todo.done).length;
        const [new_todo, set_new_todo] = signal("");

        on_mount(() => {
            console.log("WELCOME TODO");
        })
    }
</script>

<div>
    <input use:bind="['value', new_todo, set_new_todo]" type="text" placeholder="New Todo">
    <button on:click="() => { todos.add_todo(new_todo()); set_new_todo(''); }">
        Add Todo
    </button>
</div>
<div>
    <h2>Completed: {{ todo_completed() }} / {{ todos.state.length }}</h2>
    {{#each todos.state as todo, i}}
        <div>
            <label style="display: flex; gap: 0.5rem; user-select: none;">
                <input type="checkbox" :checked="todo().done" on:click="() => todos.toggle_todo(i)"/>
                <p>{{ todo().todo }}{{ todo().done ? ' ✅ ' : '' }}</p>
            </label>
            <button on:click="() => todos.remove_todo(i)">Remove</button>
        </div>
    {{/each}}
</div>
