<script>
    import { signal } from "core";

    let rowId = 1;

    const adjectives = [
        'pretty',
        'large',
        'big',
        'small',
        'tall',
        'short',
        'long',
        'handsome',
        'plain',
        'quaint',
        'clean',
        'elegant',
        'easy',
        'angry',
        'crazy',
        'helpful',
        'mushy',
        'odd',
        'unsightly',
        'adorable',
        'important',
        'inexpensive',
        'cheap',
        'expensive',
        'fancy'
    ];
    const colours = [
        'red',
        'yellow',
        'blue',
        'green',
        'pink',
        'brown',
        'purple',
        'brown',
        'white',
        'black',
        'orange'
    ];
    const nouns = [
        'table',
        'chair',
        'house',
        'bbq',
        'desk',
        'car',
        'pony',
        'cookie',
        'sandwich',
        'burger',
        'pizza',
        'mouse',
        'keyboard'
    ];

    function _random(max) {
        return Math.round(Math.random() * 1000) % max;
    }

    class Item {
        id = rowId++;
        #label = signal(`${adjectives[_random(adjectives.length)]} ${colours[_random(colours.length)]} ${nouns[_random(nouns.length)]}`);

        get label() {
            return this.#label[0]();
        };

        set label(v) {
            this.#label[1](v);
            return true;
        }
    }

    function buildData(count = 1000) {
        const data = new Array(count);
        for (let i = 0; i < count; i++) {
            data[i] = new Item();
            // data[i] = {
            //     id : rowId++,
            //     label : `${adjectives[_random(adjectives.length)]} ${colours[_random(colours.length)]} ${nouns[_random(nouns.length)]}`,
            // }
        }
        return data;
    }

    export default function(props) {

        setTimeout(() => {
            runLots();
            console.log("running run lots...");
        }, 1000)

        const [data, setData] = signal([]);
        const [selected, setSelected] = signal(null);

        const add = () => {
            console.time('add');
            data().push(...buildData(1000));
            requestAnimationFrame(() => {
                console.timeEnd('add');
            });
        }

        const clear = () => {
            console.time('clear');
            // this.data.set([])
            data().length = 0;
            requestAnimationFrame(() => {
                console.timeEnd('clear');
            });
        };

        const partialUpdate = () => {
            console.time('partial update');
            for (let i = 0; i < data().length; i += 10) {
                const row = data()[i];
                row.label = row.label + ' !!!';
            }
            requestAnimationFrame(() => {
                console.timeEnd('partial update');
            });
        };

        const remove = (row) => {
            console.time('remove');
            data().splice(data().indexOf(row), 1);
            requestAnimationFrame(() => {
                console.timeEnd('remove');
            });
        };

        const run = () => {
            console.time('run');
            setData(buildData(1000))
            requestAnimationFrame(() => {
                console.timeEnd('run');
            });
        };

        const runLots = () => {
            // const n = (new Date()).getTime()

            console.time('runLots');
            setData(buildData(10000))

            requestAnimationFrame(() => {
                console.timeEnd('runLots');
                // const e = (new Date()).getTime()
                // alert(`${e - n}ms`);
            })
        };

        const swapRows = () => {
            const tmp = data();
            if (tmp < 998) return;

            const a = tmp[1];
            tmp[1] = tmp[998];
            tmp[998] = a;

            setData(tmp);
        };

        function onMount() {
            console.log("Benchmark on mount", document.body);
            return () => {
                console.log("Benchmark on mount dispose")
            }
        }
    }
</script>

<div id="main" class="container">
	<div class="jumbotron">
		<div class="row">
			<div class="col-md-6">
				<h1>Core (non-keyed)</h1>
			</div>
			<div class="col-md-6">
				<div class="row">
					<div class="col-sm-6 smallpad">
						<button type="button" class="btn btn-primary btn-block" id="run" on:click="run">
						    Create 1,000 rows
						</button>
					</div>
					<div class="col-sm-6 smallpad">
						<button type="button" class="btn btn-primary btn-block" id="runlots" on:click="runLots">
						    Create 10,000 rows
						</button>
					</div>
					<div class="col-sm-6 smallpad">
						<button type="button" class="btn btn-primary btn-block" id="add" on:click="add">
							Append 1,000 rows
						</button>
					</div>
					<div class="col-sm-6 smallpad">
						<button
							type="button"
							class="btn btn-primary btn-block"
							id="update"
							on:click="partialUpdate">
							Update every 10th row
						</button>
					</div>
					<div class="col-sm-6 smallpad">
						<button type="button" class="btn btn-primary btn-block" id="clear" on:click="clear">
							Clear
						</button>
					</div>
					<div class="col-sm-6 smallpad">
						<button
							type="button"
							class="btn btn-primary btn-block"
							id="swaprows"
							on:click="swapRows">
							Swap Rows
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>
	<table class="table table-hover table-striped test-data">
		<tbody>
			{{#each data() as item, i}}
				<tr :class="selected() === item().id ? 'danger' : ''">
				    <td class="col-md-1">{{item().id}}</td>
					<td class="col-md-4">
						<a on:click="() => selected.set(item().id)">{{ i+1 }} {{item().label}}</a>
					</td>
					<td class="col-md-1">
					    <a on:click="() => remove(data()[i])">
						    Delete
						</a>
					</td>
					<td class="col-md-6"></td>
				</tr>
			{{/each}}
		</tbody>
	</table>
	<span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>
</div>
